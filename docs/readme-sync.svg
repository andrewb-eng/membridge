<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 210" role="img" aria-labelledby="t d">
<title id="t">MemBridge sync demo</title>
<desc id="d">Andrew's Codex session ends and its memory is distilled; a dot carries the digest across the MemBridge tile; your Claude Code then answers from project memory.</desc>
<style>
text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;}
.t{font-size:12.5px;}
.h{font-size:11.5px;fill:#6B7A99;letter-spacing:.4px;}
.mut{fill:#6B7A99}.txt{fill:#D7E0F2}.grn{fill:#4ADE9C}.blu{fill:#7FA3FF}
.cov{fill:#0E1526}
.car{fill:#D7E0F2}

.covA1{animation:covA1 14s infinite}
@keyframes covA1{0%,2.14%{transform:translateX(0);animation-timing-function:steps(7,end)}4.64%,100%{transform:translateX(55px)}}
.carA1{animation:carA1 14s infinite}
@keyframes carA1{0%,2.13%{opacity:0;transform:translateX(0)}2.14%{opacity:1;transform:translateX(0);animation-timing-function:steps(7,end)}4.64%{opacity:1;transform:translateX(52.5px)}4.7%,100%{opacity:0;transform:translateX(52.5px)}}

.covA2{animation:covA2 14s infinite}
@keyframes covA2{0%,7.5%{transform:translateX(0);animation-timing-function:steps(45,end)}17.14%,100%{transform:translateX(340px)}}
.carA2{animation:carA2 14s infinite}
@keyframes carA2{0%,7.49%{opacity:0;transform:translateX(0)}7.5%{opacity:1;transform:translateX(0);animation-timing-function:steps(45,end)}17.14%{opacity:1;transform:translateX(337.5px)}17.2%,100%{opacity:0;transform:translateX(337.5px)}}

.sA3a{animation:sA3a 14s infinite}
@keyframes sA3a{0%,19.63%{opacity:0}19.64%,100%{opacity:1}}
.sA3b{animation:sA3b 14s infinite}
@keyframes sA3b{0%,20.35%{opacity:0}20.36%,100%{opacity:1}}
.sA4{animation:sA4 14s infinite}
@keyframes sA4{0%,22.13%{opacity:0}22.14%,100%{opacity:1}}
.sA5{animation:sA5 14s infinite}
@keyframes sA5{0%,24.63%{opacity:0}24.64%,100%{opacity:1}}

.dotm{animation:dotm 14s infinite}
@keyframes dotm{0%,28.21%{opacity:0;transform:translateX(0)}28.22%{opacity:1;transform:translateX(0);animation-timing-function:linear}30.71%{opacity:1;transform:translateX(72px)}32.5%{opacity:1;transform:translateX(72px);animation-timing-function:linear}35%{opacity:1;transform:translateX(144px)}35.01%,100%{opacity:0;transform:translateX(144px)}}

.tilep{animation:tilep 14s infinite;transform-box:fill-box;transform-origin:center}
@keyframes tilep{0%,30.71%{transform:scale(1)}34.46%{transform:scale(1.09)}38.21%,100%{transform:scale(1)}}
.ringp{animation:ringp 14s infinite;transform-box:fill-box;transform-origin:center}
@keyframes ringp{0%,30.7%{opacity:0;transform:scale(1)}30.71%{opacity:.5;transform:scale(1)}36.43%,100%{opacity:0;transform:scale(1.85)}}

.covB1{animation:covB1 14s infinite}
@keyframes covB1{0%,37.86%{transform:translateX(0);animation-timing-function:steps(8,end)}40.36%,100%{transform:translateX(62px)}}
.carB1{animation:carB1 14s infinite}
@keyframes carB1{0%,37.85%{opacity:0;transform:translateX(0)}37.86%{opacity:1;transform:translateX(0);animation-timing-function:steps(8,end)}40.36%{opacity:1;transform:translateX(60px)}40.42%,100%{opacity:0;transform:translateX(60px)}}

.covB2{animation:covB2 14s infinite}
@keyframes covB2{0%,43.21%{transform:translateX(0);animation-timing-function:steps(36,end)}51.07%,100%{transform:translateX(272px)}}
.carB2{animation:carB2 14s infinite}
@keyframes carB2{0%,43.2%{opacity:0;transform:translateX(0)}43.21%{opacity:1;transform:translateX(0);animation-timing-function:steps(36,end)}51.07%{opacity:1;transform:translateX(270px)}51.13%,100%{opacity:0;transform:translateX(270px)}}

.sB3a{animation:sB3a 14s infinite}
@keyframes sB3a{0%,53.92%{opacity:0}53.93%,100%{opacity:1}}
.sB3b{animation:sB3b 14s infinite}
@keyframes sB3b{0%,54.63%{opacity:0}54.64%,100%{opacity:1}}
.sB3c{animation:sB3c 14s infinite}
@keyframes sB3c{0%,55.35%{opacity:0}55.36%,100%{opacity:1}}

@media (prefers-reduced-motion:reduce){*{animation:none !important}}
</style>
<defs>
<linearGradient id="mg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3E63F0"/><stop offset="1" stop-color="#16219B"/></linearGradient>
<clipPath id="cA"><rect x="8" y="20" width="400" height="170" rx="14"/></clipPath>
<clipPath id="cB"><rect x="552" y="20" width="400" height="170" rx="14"/></clipPath>
</defs>

<line x1="408" y1="105" x2="462" y2="105" stroke="#2F4FE0" stroke-width="1.8"/>
<line x1="498" y1="105" x2="552" y2="105" stroke="#2F4FE0" stroke-width="1.8"/>

<!-- terminal A: andrew · Codex -->
<g clip-path="url(#cA)">
<rect x="8" y="20" width="400" height="170" rx="14" fill="#0E1526"/>
<circle cx="32" cy="38" r="3.5" fill="#4ADE9C"/>
<text class="h" x="44" y="42">andrew · Codex</text>
<line x1="8" y1="54" x2="408" y2="54" stroke="#1D2740"/>
<text class="t mut" x="28" y="76" textLength="15">$ </text><text class="t txt" x="43" y="76" textLength="37.5">codex</text>
<text class="t mut" x="28" y="95" textLength="15">&gt; </text><text class="t txt" x="43" y="95" textLength="322.5">refactor retry logic in checkout validation</text>
<text class="t txt sA3a" x="43" y="114" textLength="315">Rewrote checkout/validate.ts — retries now</text>
<text class="t txt sA3b" x="43" y="133" textLength="217.5">cap at 3, exponential backoff</text>
<text class="t mut sA4" x="43" y="152" textLength="255">2 files changed · 14 tests passing</text>
<text class="t grn sA5" x="28" y="171" textLength="255">✓ session ended — memory distilled</text>
<rect class="cov covA1" x="27" y="63" width="55" height="17" transform="translate(55,0)"/>
<rect class="cov covA2" x="27" y="82" width="340" height="17" transform="translate(340,0)"/>
<rect class="car carA1" x="28.5" y="64.5" width="6.5" height="13" opacity="0"/>
<rect class="car carA2" x="28.5" y="83.5" width="6.5" height="13" opacity="0"/>
</g>
<rect x="8" y="20" width="400" height="170" rx="14" fill="none" stroke="#1D2740"/>

<!-- terminal B: you · Claude Code -->
<g clip-path="url(#cB)">
<rect x="552" y="20" width="400" height="170" rx="14" fill="#0E1526"/>
<circle cx="576" cy="38" r="3.5" fill="#4ADE9C"/>
<text class="h" x="588" y="42">you · Claude Code</text>
<line x1="552" y1="54" x2="952" y2="54" stroke="#1D2740"/>
<text class="t mut" x="572" y="76" textLength="15">$ </text><text class="t txt" x="587" y="76" textLength="45">claude</text>
<text class="t mut" x="572" y="95" textLength="15">&gt; </text><text class="t txt" x="587" y="95" textLength="255">why do checkout retries stop at 3?</text>
<text class="t blu sB3a" x="572" y="114" textLength="15">⏺ </text><text class="t txt sB3a" x="587" y="114" textLength="255">From project memory: andrew capped</text>
<text class="t txt sB3b" x="587" y="133" textLength="300">retries at 3 with exponential backoff in</text>
<text class="t txt sB3c" x="587" y="152" textLength="270">checkout/validate.ts, two hours ago.</text>
<rect class="cov covB1" x="571" y="63" width="62" height="17" transform="translate(62,0)"/>
<rect class="cov covB2" x="571" y="82" width="272" height="17" transform="translate(272,0)"/>
<rect class="car carB1" x="572.5" y="64.5" width="6.5" height="13" opacity="0"/>
<rect class="car carB2" x="572.5" y="83.5" width="6.5" height="13" opacity="0"/>
</g>
<rect x="552" y="20" width="400" height="170" rx="14" fill="none" stroke="#1D2740"/>

<!-- bridge tile -->
<rect class="ringp" x="457" y="82" width="46" height="46" rx="13" fill="none" stroke="#2F4FE0" stroke-width="2" opacity="0"/>
<g class="tilep">
<g transform="translate(462,87) scale(1.125)">
<rect x="0.8" y="0.8" width="30.4" height="30.4" rx="8.5" fill="url(#mg)" stroke="#4A78FF" stroke-width="1.6"/>
<path d="M9 22.5 V11 L16 18 L23 11 V22.5" fill="none" stroke="#FFFFFF" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M5 16.5 H27" fill="none" stroke="#FFFFFF" stroke-width="2.1" stroke-linecap="round"/>
</g>
</g>
<circle class="dotm" cx="408" cy="105" r="4" fill="#2F4FE0" opacity="0"/>
</svg>
